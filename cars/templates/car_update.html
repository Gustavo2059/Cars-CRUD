{% extends "base.html" %}

{% block title %}Editar {{ object.brand }} {{ object.model }} — AutoLux{% endblock %}

{% block content %}
  <style>
    .form-shell {
      max-width: 720px;
      margin: 0 auto;
    }
    .form-head {
      text-align: center;
      margin-bottom: 32px;
    }
    .form-head .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .form-head h1 {
      font-size: clamp(28px, 4vw, 40px);
      margin-top: 8px;
      font-weight: 700;
    }

    .form-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: var(--shadow-lg);
    }

    /* Estilizar form.as_table do Django */
    .form-card table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .form-card table tr { display: flex; flex-direction: column; margin-bottom: 18px; }
    .form-card table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 0 8px;
      font-family: 'Inter', sans-serif;
    }
    .form-card table td { padding: 0; }

    .form-card input[type="text"],
    .form-card input[type="number"],
    .form-card input[type="email"],
    .form-card input[type="password"],
    .form-card input[type="file"],
    .form-card select,
    .form-card textarea {
      width: 100%;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 10px;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .form-card input:focus, .form-card select:focus, .form-card textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
    }
    .form-card textarea { min-height: 100px; resize: vertical; }
    .form-card .helptext { color: var(--text-muted); font-size: 12px; display: block; margin-top: 6px; }
    .form-card .errorlist { color: var(--danger); font-size: 13px; list-style: none; padding: 0; margin: 6px 0 0; }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 13px 26px;
      font-size: 14px; font-weight: 600;
      font-family: inherit;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none !important;
    }
    .btn-primary { background: var(--accent); color: #0a0e14; box-shadow: var(--accent-glow); }
    .btn-primary:hover { background: #fff; transform: translateY(-1px); }
    .btn-ghost { background: transparent; border-color: var(--border-strong); color: var(--text); }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.05); }
    .btn-danger { background: transparent; border-color: rgba(255, 77, 94, 0.4); color: var(--danger); }
    .btn-danger:hover { background: rgba(255, 77, 94, 0.1); border-color: var(--danger); }
  </style>

  <div class="form-shell">
    <div class="form-head">
      <span class="eyebrow">Edição</span>
      <h1>Editar carro</h1>
    </div>

    <form method="post" enctype="multipart/form-data" class="form-card">
      {% csrf_token %}
      <table>
        {{ form.as_table }}
      </table>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Salvar alterações</button>
        <a href="{% url 'car_delete' pk=object.pk %}" class="btn btn-danger">Deletar</a>
        <a href="{% url 'cars_list' %}" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
