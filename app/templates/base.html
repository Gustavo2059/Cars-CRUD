<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AutoLux — Concessionária Premium{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0e14;
      --bg-elev: #11161f;
      --bg-card: rgba(22, 28, 39, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #e8ecf2;
      --text-muted: #8a93a6;
      --accent: #00d4ff;
      --accent-glow: 0 0 24px rgba(0, 212, 255, 0.35);
      --accent-2: #0096c7;
      --danger: #ff4d5e;
      --success: #2ed573;
      --radius: 14px;
      --shadow-lg: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 212, 255, 0.15), transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 20%, rgba(0, 150, 199, 0.1), transparent 60%);
      background-attachment: fixed;
    }

    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.02em;
      margin: 0;
    }

    a { color: inherit; text-decoration: none; }

    /* ========== HEADER / NAV ========== */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10, 14, 20, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    nav {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 28px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: var(--accent-glow);
      display: grid; place-items: center;
      color: #0a0e14;
      font-weight: 800;
    }

    nav ul {
      list-style: none;
      margin: 0; padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    nav ul li.user-greet {
      color: var(--text-muted);
      font-size: 14px;
      padding: 0 12px;
      border-right: 1px solid var(--border);
      margin-right: 8px;
    }

    nav ul li a {
      display: inline-flex;
      align-items: center;
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: all 0.2s ease;
    }

    nav ul li a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent);
    }

    nav ul li.cta a {
      background: var(--accent);
      color: #0a0e14;
      font-weight: 600;
      box-shadow: var(--accent-glow);
    }

    nav ul li.cta a:hover {
      background: #fff;
      color: #0a0e14;
    }

    /* ========== MAIN ========== */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 28px 80px;
      min-height: calc(100vh - 72px - 80px);
    }

    /* ========== FOOTER ========== */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      background: rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 720px) {
      nav { padding: 0 16px; height: 64px; }
      nav ul li a { padding: 8px 10px; font-size: 13px; }
      nav ul li.user-greet { display: none; }
      main { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{% url 'cars_list' %}" class="brand">
        <span class="brand-mark">A</span>
        AutoLux
      </a>

      <ul>
        {% if user.is_authenticated %}
          <li class="user-greet">Olá, {{ user.username }}</li>
          <li><a href="{% url 'cars_list' %}">Carros</a></li>
          <li class="cta"><a href="{% url 'new_car' %}">+ Cadastrar</a></li>
          <li><a href="{% url 'logout' %}">Sair</a></li>
        {% else %}
          <li><a href="{% url 'cars_list' %}">Carros</a></li>
          <li><a href="{% url 'register' %}">Registrar</a></li>
          <li class="cta"><a href="{% url 'login' %}">Login</a></li>
        {% endif %}
      </ul>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; 2026 AutoLux — Gustavo Ltda. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
