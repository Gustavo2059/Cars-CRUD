{% extends "base.html" %}

{% block title %}Login — AutoLux{% endblock %}

{% block content %}
  <style>
    .auth-shell {
      max-width: 520px;
      margin: 0 auto;
    }

    .auth-head {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-head .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .auth-head h1 {
      font-size: clamp(28px, 4vw, 40px);
      margin-top: 8px;
      font-weight: 700;
    }

    .auth-head p {
      color: var(--text-muted);
      margin-top: 10px;
      font-size: 15px;
    }

    .auth-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: var(--shadow-lg);
    }

    .auth-card table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .auth-card table tr {
      display: flex;
      flex-direction: column;
      margin-bottom: 18px;
    }

    .auth-card table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 0 8px;
      font-family: 'Inter', sans-serif;
    }

    .auth-card table td {
      padding: 0;
    }

    .auth-card input[type="text"],
    .auth-card input[type="email"],
    .auth-card input[type="password"] {
      width: 100%;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 10px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .auth-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
    }

    .auth-card .errorlist {
      color: var(--danger);
      font-size: 13px;
      list-style: none;
      padding: 0;
      margin: 6px 0 0;
    }

    .auth-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none !important;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0e14;
      box-shadow: var(--accent-glow);
    }

    .btn-primary:hover {
      background: #fff;
      transform: translateY(-1px);
    }
  </style>

  <div class="auth-shell">
    <div class="auth-head">
      <span class="eyebrow">Acesso ao sistema</span>
      <h1>Entrar</h1>
      <p>Informe seu usuário e senha para acessar o painel da AutoLux.</p>
    </div>

    <form method="post" class="auth-card">
      {% csrf_token %}

      {{ login_form.non_field_errors }}

      <table>
        {{ login_form.as_table }}
      </table>

      <div class="auth-actions">
        <button type="submit" class="btn btn-primary">Entrar</button>
      </div>
    </form>
  </div>
{% endblock %}
